name: tool-forge
description: "Validates and registers a new tool folder into MCPToolkit manifest — run after the agent creates the tool files."
category: meta
inputs:
  - name: tool_dir
    type: string
    required: true
    description: "Path to the new tool folder (absolute or relative to toolkit root)"
  - name: action
    type: string
    required: false
    default: "register"
    description: "validate | register (default: register — runs validate first, then registers)"
outputs: "Tool validated against forge-conditions and registered in manifest.json + git committed"
call: "python3 {tool_dir}/../tool-forge/register.py {tool_dir}"
tags: [meta, forge, validation, registration]
tested: true
examples:
  - "tool-forge --tool_dir tools/my-new-tool"
  - "tool-forge --tool_dir tools/my-new-tool --action validate"
note: "Agent creates tool files manually following FORGE.md, then calls this tool to validate+register."
